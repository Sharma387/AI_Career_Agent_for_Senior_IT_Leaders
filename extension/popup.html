<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Career Agent - Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="popup-container">
    <h1 class="popup-title">AI Career Agent</h1>
    <p class="popup-subtitle">LinkedIn Job Capture</p>

    <div class="status-container">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Not connected</span>
    </div>

    <!-- Capture Current Job Section -->
    <div class="capture-section" id="captureSection">
      <button type="button" class="btn btn-capture" id="captureBtn">📋 Capture Current Job</button>
      <div class="capture-result" id="captureResult"></div>
    </div>

    <hr class="divider">

    <form id="settingsForm">
      <div class="form-group">
        <label for="apiUrl">API URL</label>
        <input
          type="url"
          id="apiUrl"
          name="apiUrl"
          placeholder="http://localhost:8000"
          required
        >
      </div>

      <div class="form-group">
        <label for="authToken">Auth Token</label>
        <input
          type="password"
          id="authToken"
          name="authToken"
          placeholder="Enter your JWT token"
          required
        >
      </div>

      <div class="button-group">
        <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
        <button type="button" class="btn btn-secondary" id="testBtn">Test Connection</button>
      </div>
    </form>

    <div class="message" id="message"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
